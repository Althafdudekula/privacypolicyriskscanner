<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy Scanner — AI Risk Analysis</title>
    <meta name="description" content="Analyze privacy policies for hidden risks using Google Gemini AI. Get instant risk scores and detailed breakdowns.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <div id="app">
      <header class="app-header">
        <div class="header-content">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <polyline points="9 12 11 14 15 10"></polyline>
            </svg>
          </div>
          <div>
            <h1 class="title">Privacy Policy Scanner</h1>
            <p class="subtitle">Powered by Google Gemini AI — deep risk analysis in seconds</p>
          </div>
        </div>
      </header>

      <main class="main-content">
        <!-- Input Section -->
        <section class="scan-section glass-card" id="scan-section">
          <label for="policy-input" class="visually-hidden">Paste privacy policy text</label>
          <textarea id="policy-input" placeholder="Paste a privacy policy or terms of service text here...&#10;&#10;The AI will analyze it for data collection, sharing practices, user rights, and hidden risks."></textarea>
          <div class="action-footer">
            <span class="status-indicator" id="status-indicator">
              <span class="status-dot"></span>
              <span id="status-text">Enter API key to begin</span>
            </span>
            <button class="primary-btn" id="scan-btn" disabled>
              <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <span class="btn-text" id="btn-label">Analyze Policy</span>
            </button>
          </div>
        </section>

        <!-- Overall Score -->
        <section class="overall-score-section" id="overall-score-section" style="display:none;">
          <div class="score-ring-card glass-card">
            <div class="score-ring" id="score-ring">
              <svg viewBox="0 0 120 120">
                <circle class="score-ring-bg" cx="60" cy="60" r="52" />
                <circle class="score-ring-fill" cx="60" cy="60" r="52" id="score-ring-fill" />
              </svg>
              <div class="score-value" id="score-value">--</div>
            </div>
            <div class="score-label" id="score-label">Risk Score</div>
          </div>
        </section>

        <!-- Stats Overview -->
        <section class="stats-grid" id="stats-section" style="display:none;">
          <div class="stat-card glass-card stat-high">
            <div class="stat-header">
              <span class="stat-title">High Risk</span>
              <div class="indicator critical"></div>
            </div>
            <div class="stat-value" id="count-high">0</div>
          </div>
          <div class="stat-card glass-card stat-medium">
            <div class="stat-header">
              <span class="stat-title">Medium Risk</span>
              <div class="indicator warning"></div>
            </div>
            <div class="stat-value" id="count-medium">0</div>
          </div>
          <div class="stat-card glass-card stat-low">
            <div class="stat-header">
              <span class="stat-title">Low Risk</span>
              <div class="indicator safe"></div>
            </div>
            <div class="stat-value" id="count-low">0</div>
          </div>
        </section>

        <!-- Results Feed -->
        <section class="results-container" id="results-container" style="display:none;">
          <h2 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Detailed Analysis
          </h2>
          <div class="results-feed" id="results"></div>
        </section>
      </main>

      <footer class="app-footer">
        <p>Built with Gemini AI · Analysis runs via API · Your text is not stored</p>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
